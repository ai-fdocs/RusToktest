[module]
slug = "order"
name = "Order"
version = "0.1.0"
description = "Default order submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "OrderModule"

[provides.admin_ui]
leptos_crate = "rustok-order-admin"
route_segment = "orders"
nav_label = "Orders"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-order-storefront"
slot = "checkout_result_handoff"
route_segment = "orders"
page_title = "Orders"
